<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>iPhone Evolution 5-17</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #f5f5f7; color: #1d1d1f; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .iphone-card { background: white; border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 250px; }
        header img { width: 120px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo iPhone">
        <h1>De l'iPhone 5 à l'iPhone 17</h1>
    </header>
    <div class="container">
        <div class="iphone-card"><h3>iPhone 5</h3><p>Sortie : 2012</p></div>
        <div class="iphone-card"><h3>iPhone X</h3><p>Sortie : 2017</p></div>
        <div class="iphone-card"><h3>iPhone 16</h3><p>Sortie : 2024</p></div>
        <div class="iphone-card"><h3>iPhone 17</h3><p>Sortie : Prochainement</p></div>
    </div>
</body>
</html>
